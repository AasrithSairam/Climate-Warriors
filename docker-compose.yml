version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./src/backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./src/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./src/frontend:/app
      - /app/node_modules

  ai:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src/ai:/app
